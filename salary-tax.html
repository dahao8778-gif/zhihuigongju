<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年个人所得税测算_税后实发工资预测 - 智汇工薪助手</title>
    <link rel="canonical" href="https://lixijsq.com/salary-tax.html">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 专项扣除勾选区域美化样式 */
        .deduction-check-wrap {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px 16px;
            margin-top: 12px;
        }
        .deduction-check-wrap h4 {
            margin: 0 0 16px 0;
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 600;
        }
        .deduction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px 16px;
        }
        .deduction-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }
        .deduction-item:hover {
            background: #e8f0fe;
        }
        .deduction-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        /* 自定义复选框美化 */
        .deduction-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }
        .deduction-item label {
            margin: 0;
            font-weight: normal;
            font-size: 0.92rem;
            cursor: pointer;
            line-height: 1.4;
            width: 100%;
        }
        .deduction-tip {
            font-size: 0.85rem;
            color: var(--secondary);
            margin-top: 12px;
            padding-left: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">智汇工薪助手</a>
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
    </nav>
    <main class="container">
        <h1>税后工资与个税抵扣测算</h1>
        <div class="card">
            <div class="input-group">
                <label>税前薪资 (元/月)</label>
                <input type="number" id="s" value="12000" min="0" placeholder="例如：12000">
            </div>
            <div class="input-group">
                <label>五险一金个人缴纳 (元/月)</label>
                <input type="number" id="i" value="2000" min="0" placeholder="例如：2000">
            </div>
            
            <!-- 调整后：总额输入框在上 -->
            <div class="input-group">
                <label>专项附加扣除总额 (元/月，可手动修改)</label>
                <input type="number" id="d" value="0" min="0" placeholder="勾选下方扣除项自动计算总额">
            </div>

            <!-- 调整后：勾选区域移到总额下方，美化界面 -->
            <div class="deduction-check-wrap">
                <h4>专项附加扣除项（勾选自动计算总额）</h4>
                <div class="deduction-grid">
                    <div class="deduction-item">
                        <input type="checkbox" id="d1" value="2000" onchange="updateDeduction()">
                        <label for="d1">子女教育 (2000元/孩/月)</label>
                    </div>
                    <div class="deduction-item">
                        <input type="checkbox" id="d2" value="400" onchange="updateDeduction()">
                        <label for="d2">继续教育 (400元/月)</label>
                    </div>
                    <div class="deduction-item" id="loanItem">
                        <input type="checkbox" id="d3" value="1000" onchange="updateDeduction()">
                        <label for="d3">住房贷款利息 (1000元/月)</label>
                    </div>
                    <div class="deduction-item" id="rentItem">
                        <input type="checkbox" id="d4" value="1500" onchange="updateDeduction()">
                        <label for="d4">住房租金 (1500元/月·一线)</label>
                    </div>
                    <div class="deduction-item">
                        <input type="checkbox" id="d5" value="2000" onchange="updateDeduction()">
                        <label for="d5">赡养老人 (2000元/月·独生)</label>
                    </div>
                    <div class="deduction-item">
                        <input type="checkbox" id="d6" value="2000" onchange="updateDeduction()">
                        <label for="d6">3岁以下婴幼儿照护 (2000元/孩/月)</label>
                    </div>
                </div>
                <p class="deduction-tip">* 提示：住房贷款利息与住房租金不可同时享受扣除</p>
            </div>
            
            <button onclick="calcT()">计算税后到手</button>
            <button onclick="sharePage()" style="background: var(--accent); margin-top: 10px;">📤 一键分享</button>
            <div id="res" class="result" style="display:none;"></div>
        </div>

        <div class="article-nav">
            <h3>📖 税务筹划解读</h3>
            <ul>
                <li><a href="article-tax-1.html">如何利用专项附加扣除多拿3000元？</a></li>
                <li><a href="article-tax-2.html">个税累计预扣法：为什么下半年扣税变多了？</a></li>
            </ul>
        </div>
    </main>
    <footer class="footer-links">
        <a href="contact.html">联系反馈</a> | <a href="privacy.html">隐私政策</a> | <a href="disclaimer.html">免责声明</a>
    </footer>
    <script>
        // 自动更新专项附加扣除总额 + 贷款/租金互斥逻辑
        function updateDeduction() {
            const loanChecked = document.getElementById('d3').checked;
            const rentChecked = document.getElementById('d4').checked;
            const loanItem = document.getElementById('loanItem');
            const rentItem = document.getElementById('rentItem');

            // 互斥逻辑：勾选贷款则禁用租金，勾选租金则禁用贷款
            if (loanChecked) {
                rentItem.classList.add('disabled');
                document.getElementById('d4').checked = false;
            } else if (rentChecked) {
                loanItem.classList.add('disabled');
                document.getElementById('d3').checked = false;
            } else {
                loanItem.classList.remove('disabled');
                rentItem.classList.remove('disabled');
            }

            // 计算总额
            let total = 0;
            const checkboxes = ['d1', 'd2', 'd3', 'd4', 'd5', 'd6'];
            checkboxes.forEach(id => {
                const cb = document.getElementById(id);
                if (cb.checked) total += parseInt(cb.value);
            });
            document.getElementById('d').value = total;
        }

        // 2026最新个税计算逻辑（累计预扣法简化版）
        function calcT() {
            let s = parseFloat(document.getElementById('s').value) || 0;
            let d = parseFloat(document.getElementById('d').value) || 0;
            let i = parseFloat(document.getElementById('i').value) || 0;
            
            // 起征点5000元/月
            const threshold = 5000;
            // 应纳税所得额
            let taxable = s - d - i - threshold;
            let tax = 0;

            // 2026年个税税率表（月度）
            if (taxable > 0) {
                if (taxable <= 3000) tax = taxable * 0.03;
                else if (taxable <= 12000) tax = taxable * 0.1 - 210;
                else if (taxable <= 25000) tax = taxable * 0.2 - 1410;
                else if (taxable <= 35000) tax = taxable * 0.25 - 2660;
                else if (taxable <= 55000) tax = taxable * 0.3 - 4410;
                else if (taxable <= 80000) tax = taxable * 0.35 - 7160;
                else tax = taxable * 0.45 - 15160;
            }

            // 税后到手
            let netSalary = s - i - tax;
            
            let res = document.getElementById('res');
            res.style.display = 'block';
            res.innerHTML = `
                📌 应纳税所得额：￥${taxable.toFixed(2)}<br>
                📌 月度应纳税额：￥${tax.toFixed(2)}<br>
                📌 五险一金扣除：￥${i.toFixed(2)}<br>
                📌 专项附加扣除：￥${d.toFixed(2)}<br>
                📌 税后到手工资：<strong>￥${netSalary.toFixed(2)}</strong><br>
                📌 年度税后总额：￥${(netSalary * 12).toFixed(2)}
            `;
        }

        // 分享功能
        function sharePage() {
            const url = window.location.href;
            const title = document.title;
            if (navigator.share) {
                navigator.share({ title, url }).catch(console.error);
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    alert('链接已复制到剪贴板，可分享给好友！');
                }).catch(() => alert('复制失败，请手动复制链接'));
            }
        }

        // 手动修改总额时，同步取消勾选
        document.getElementById('d').addEventListener('input', function() {
            const manualVal = parseFloat(this.value) || 0;
            if (manualVal === 0) {
                const checkboxes = ['d1', 'd2', 'd3', 'd4', 'd5', 'd6'];
                checkboxes.forEach(id => {
                    document.getElementById(id).checked = false;
                });
                document.getElementById('loanItem').classList.remove('disabled');
                document.getElementById('rentItem').classList.remove('disabled');
            }
        });
    </script>
</body>
</html>
